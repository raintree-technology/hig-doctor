name: Publish hig-doctor

on:
  workflow_dispatch:
  push:
    tags:
      - "hig-doctor-v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/hig-doctor/src-termcast
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Verify version (tag matches manifest, not already published)
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#hig-doctor-v}"
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "::error::Tag ${GITHUB_REF_NAME} implies version ${TAG_VERSION} but package.json is ${PKG_VERSION}"
              exit 1
            fi
          fi
          if npm view "${PKG_NAME}@${PKG_VERSION}" version > /dev/null 2>&1; then
            echo "::error::${PKG_NAME}@${PKG_VERSION} is already published to npm"
            exit 1
          fi
          echo "OK to publish ${PKG_NAME}@${PKG_VERSION}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: bun test

      - name: Build bundle
        run: npm run build

      - name: Package dry run
        run: npm pack --dry-run

      - name: Publish with trusted publishing
        run: npm publish --provenance --access public
