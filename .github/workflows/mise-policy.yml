# Generated by the Code workspace control plane.
name: Repository policy and validation

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  MISE_LOCKED: "1"

jobs:
  mise-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          version: 2026.7.1
          install: false
          cache: true
      - name: Install locked toolchain
        run: mise install --locked
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Validate Mise task definitions
        run: mise tasks validate --errors-only
      - name: Validate repository
        run: mise run validate
      - name: Verify lockfile drift
        run: |
          MISE_LOCKED=0 mise lock --platform linux-arm64,linux-arm64-musl,linux-x64,linux-x64-musl,macos-arm64,macos-x64,windows-x64 -C .
          git diff --exit-code -- mise.lock
