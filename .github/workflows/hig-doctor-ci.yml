name: HIG Doctor CI

env:
  MISE_LOCKED: "1"

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validator:
    name: Skill validator (internal)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          version: 2026.7.1
          install: true
          cache: true
      - name: Install dependencies
        run: mise run setup

      - name: Run package tests
        working-directory: packages/hig-doctor
        run: bun test

      - name: Smoke check verbose mode
        run: node packages/hig-doctor/src/cli.js . --verbose

      - name: Smoke check score mode
        run: node packages/hig-doctor/src/cli.js . --score

      - name: Smoke check strict mode
        run: node packages/hig-doctor/src/cli.js . --strict

  audit:
    name: Audit tool
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          version: 2026.7.1
          install: true
          cache: true
      - name: Run audit tool tests
        working-directory: packages/hig-doctor/src-termcast
        run: bun test

      - name: Typecheck audit tool
        working-directory: packages/hig-doctor/src-termcast
        run: mise run typecheck

      - name: Smoke audit against the website
        run: bun packages/hig-doctor/src-termcast/src/cli.ts website --json

  mcp:
    name: MCP server
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          version: 2026.7.1
          install: true
          cache: true
      - name: Install MCP server dependencies
        working-directory: packages/hig-doctor/src-mcp
        run: mise run setup

      - name: Run MCP server tests
        working-directory: packages/hig-doctor/src-mcp
        run: bun test

      - name: Typecheck MCP server
        working-directory: packages/hig-doctor/src-mcp
        run: mise run typecheck

      - name: Smoke check MCP server handshake
        working-directory: packages/hig-doctor/src-mcp
        run: |
          REQUEST='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}
          {"jsonrpc":"2.0","method":"notifications/initialized"}
          {"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}'
          echo "$REQUEST" | bun src/index.ts > /tmp/mcp-out.json &
          BUNPID=$!
          sleep 3
          kill $BUNPID 2>/dev/null || true
          wait $BUNPID 2>/dev/null || true
          grep -q '"name":"hig_list_skills"' /tmp/mcp-out.json
          grep -q '"name":"hig_lookup"' /tmp/mcp-out.json
          grep -q '"name":"hig_audit"' /tmp/mcp-out.json
