name: HIG Doctor CI

env:
  MISE_LOCKED: "1"

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate packages and skills
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          version: 2026.7.1
          install: true
          cache: true

      - name: Validate Mise task definitions
        run: mise tasks validate --errors-only

      - name: Install dependencies
        run: mise run setup

      - name: Validate repository
        run: mise run validate

      - name: Smoke check strict and score modes
        run: |
          node packages/hig-doctor/src/cli.js . --strict
          node packages/hig-doctor/src/cli.js . --score

      - name: Smoke audit against the website
        run: bun packages/hig-doctor/src-termcast/src/cli.ts website --json

      - name: Smoke check MCP server handshake
        working-directory: packages/hig-doctor/src-mcp
        run: |
          REQUEST='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}
          {"jsonrpc":"2.0","method":"notifications/initialized"}
          {"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}'
          echo "$REQUEST" | bun src/index.ts > /tmp/mcp-out.json &
          BUNPID=$!
          sleep 3
          kill $BUNPID 2>/dev/null || true
          wait $BUNPID 2>/dev/null || true
          grep -q '"name":"hig_list_skills"' /tmp/mcp-out.json
          grep -q '"name":"hig_lookup"' /tmp/mcp-out.json
          grep -q '"name":"hig_audit"' /tmp/mcp-out.json

      - name: Verify toolchain lock drift
        run: |
          MISE_LOCKED=0 mise lock --platform linux-arm64,linux-arm64-musl,linux-x64,linux-x64-musl,macos-arm64,macos-x64,windows-x64 -C .
          git diff --exit-code -- mise.lock
