name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "VERSIONS.md"
      - ".claude-plugin/**"
      - "packages/hig-doctor/**"
      - "action.yml"
      - ".github/workflows/validate-skills.yml"
  pull_request:
    paths:
      - "skills/**"
      - "VERSIONS.md"
      - ".claude-plugin/**"
      - "packages/hig-doctor/**"
      - "action.yml"
      - ".github/workflows/validate-skills.yml"

jobs:
  validate:
    name: Validate skill definitions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - id: doctor
        uses: ./
        with:
          directory: .
          verbose: "true"
          strict: "true"

      - name: Report score
        run: 'echo "HIG Doctor score: ${{ steps.doctor.outputs.score }}"'
