name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "VERSIONS.md"
      - ".claude-plugin/**"
      - "packages/hig-doctor/src/**"
      - "packages/hig-doctor/package.json"
      - ".github/workflows/validate-skills.yml"
  pull_request:
    paths:
      - "skills/**"
      - "VERSIONS.md"
      - ".claude-plugin/**"
      - "packages/hig-doctor/src/**"
      - "packages/hig-doctor/package.json"
      - ".github/workflows/validate-skills.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate skill definitions
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/hig-doctor/package-lock.json

      - name: Install validator dependencies
        run: npm ci --prefix packages/hig-doctor

      - name: Run validator (strict)
        run: node packages/hig-doctor/src/cli.js . --verbose --strict
