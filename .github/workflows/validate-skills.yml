name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "VERSIONS.md"
      - ".claude-plugin/**"
      - "packages/hig-doctor/src/**"
      - "packages/hig-doctor/package.json"
      - ".github/workflows/validate-skills.yml"
  pull_request:
    paths:
      - "skills/**"
      - "VERSIONS.md"
      - ".claude-plugin/**"
      - "packages/hig-doctor/src/**"
      - "packages/hig-doctor/package.json"
      - ".github/workflows/validate-skills.yml"

jobs:
  validate:
    name: Validate skill definitions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/hig-doctor/package-lock.json

      - name: Install validator dependencies
        run: npm ci --prefix packages/hig-doctor

      - name: Run validator (strict)
        run: node packages/hig-doctor/src/cli.js . --verbose --strict
