name: Repo checks

# Runs the repository-wide guard tests on every change. These encode real
# invariants (workflows pin actions to SHAs + use least privilege; the website's
# audit-patterns copy stays byte-identical to the canonical module) and were
# previously enforced by nothing in CI.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  root-guards:
    name: Root guards (workflow security + patterns sync)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run root guard tests
        run: node --test test/workflow-security.test.mjs test/audit-patterns-sync.test.mjs
