version: 2
updates:
  # Marketing website
  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Skill validator (internal tooling)
  - package-ecosystem: npm
    directory: /packages/hig-doctor
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Published: audit CLI (hig-doctor)
  - package-ecosystem: npm
    directory: /packages/hig-doctor/src-termcast
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Published: MCP server (hig-mcp)
  - package-ecosystem: npm
    directory: /packages/hig-doctor/src-mcp
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions — keeps the SHA-pinned action references current
  # (the workflow-security test enforces pinning but cannot surface upgrades).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
