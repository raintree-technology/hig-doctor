name: "HIG Doctor Audit"
description: "Audit a project for Apple Human Interface Guidelines compliance"
branding:
  icon: "activity"
  color: "gray-dark"

inputs:
  directory:
    description: "Project directory to audit (relative to repo root)"
    default: "."
  fail-on:
    description: "Fail the job if any concern at/above this severity is found. One of: critical, serious, moderate, none"
    default: "none"

outputs:
  critical:
    description: "Count of critical-severity concerns"
    value: ${{ steps.audit.outputs.critical }}
  serious:
    description: "Count of serious-severity concerns"
    value: ${{ steps.audit.outputs.serious }}
  moderate:
    description: "Count of moderate-severity concerns"
    value: ${{ steps.audit.outputs.moderate }}
  report:
    description: "Path to the generated hig-audit.md report"
    value: ${{ steps.audit.outputs.report }}

runs:
  using: "composite"
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: latest

    - id: audit
      name: Run HIG audit
      shell: bash
      env:
        INPUT_DIRECTORY: ${{ inputs.directory }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        AUDIT_DIR: ${{ github.action_path }}/packages/hig-doctor/src-termcast
      run: |
        TARGET="$GITHUB_WORKSPACE/$INPUT_DIRECTORY"
        REPORT="$GITHUB_WORKSPACE/hig-audit.md"

        # Full markdown report for humans and downstream steps
        bun "$AUDIT_DIR/src/cli.ts" "$TARGET" --stdout > "$REPORT"
        echo "report=$REPORT" >> "$GITHUB_OUTPUT"

        # JSON for severity extraction
        JSON="$(bun "$AUDIT_DIR/src/cli.ts" "$TARGET" --json)"
        echo "$JSON" | jq '{severities, files, frameworks}'

        CRITICAL=$(echo "$JSON" | jq -r '.severities.critical')
        SERIOUS=$(echo "$JSON" | jq -r '.severities.serious')
        MODERATE=$(echo "$JSON" | jq -r '.severities.moderate')
        echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
        echo "serious=$SERIOUS" >> "$GITHUB_OUTPUT"
        echo "moderate=$MODERATE" >> "$GITHUB_OUTPUT"

        echo "### HIG Audit" >> "$GITHUB_STEP_SUMMARY"
        echo "- Critical: $CRITICAL" >> "$GITHUB_STEP_SUMMARY"
        echo "- Serious:  $SERIOUS" >> "$GITHUB_STEP_SUMMARY"
        echo "- Moderate: $MODERATE" >> "$GITHUB_STEP_SUMMARY"

        case "$INPUT_FAIL_ON" in
          critical)
            [ "$CRITICAL" -gt 0 ] && exit 1 || exit 0 ;;
          serious)
            [ "$((CRITICAL + SERIOUS))" -gt 0 ] && exit 1 || exit 0 ;;
          moderate)
            [ "$((CRITICAL + SERIOUS + MODERATE))" -gt 0 ] && exit 1 || exit 0 ;;
          none|"")
            exit 0 ;;
          *)
            echo "Invalid fail-on value: $INPUT_FAIL_ON" >&2
            exit 2 ;;
        esac
